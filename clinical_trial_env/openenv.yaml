spec_version: 1
name: clinical_trial_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
tasks:
  - id: task1
    name: "Easy: Explicit Matching"
    description: "10 patients, 1 trial. EHR language matches trial criteria exactly. Direct keyword matching."
  - id: task2
    name: "Medium: Ontology & Inference"
    description: "20 patients, 3 trials. Agent must infer conditions from medications and lab values."
  - id: task3
    name: "Hard: Incomplete Data"
    description: "30 patients, 5 trials. Some EHRs missing labs. Agent must use RequestLabResult before deciding."
